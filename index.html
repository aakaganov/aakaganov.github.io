<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShelfTalk — Reader Chats</title>
    <script type="importmap">
      {
        "imports": {
          "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
          "vue-router": "https://cdn.jsdelivr.net/npm/vue-router@5.0.4/dist/vue-router.esm-browser.prod.js",
          "@graffiti-garden/implementation-local": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-local@1.2.0/dist/browser/index.js",
          "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
          "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs"
        }
      }
    </script>
    <script src="main.js" type="module"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <footer class="hw-deliverable-footer" aria-label="Course deliverable links">
      <a
        href="https://github.com/aakaganov/aakaganov.github.io.git"
        target="_blank"
        rel="noopener noreferrer"
        >Chat app source code (GitHub)</a>
      <span aria-hidden="true"> · </span>
      <a
        href="https://aakaganov.github.io/"
        target="_blank"
        rel="noopener noreferrer"
        >Chat app on GitHub Pages</a>
    </footer>
    <div id="app" class="app-root" role="status" aria-live="polite">Loading ShelfTalk…</div>

    <template id="template">
      <div class="layout">
        <header class="top-bar">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">📚</span>
            <div>
              <div class="brand-title">
                <router-link class="brand-link" to="/">ShelfTalk</router-link>
              </div>
              <div class="brand-tagline">Book-club chats with spoiler-aware messages</div>
            </div>
          </div>
          <nav class="app-nav" aria-label="Primary">
            <router-link class="nav-pill" to="/" exact-active-class="nav-pill-active">Home</router-link>
            <router-link
              v-if="$graffitiSession.value"
              class="nav-pill"
              to="/dms"
              active-class="nav-pill-active"
              >Messages</router-link>
            <router-link class="nav-pill" to="/about" active-class="nav-pill-active">About</router-link>
          </nav>
          <div class="session-actions">
            <button
              v-if="!$graffitiSession.value"
              type="button"
              class="btn btn-primary"
              @click="$graffiti.login()"
            >
              Log in
            </button>
            <template v-else>
              <span class="session-label">
                Signed in as
                <graffiti-actor-to-handle :actor="$graffitiSession.value.actor" />
              </span>
              <button
                type="button"
                class="btn btn-ghost"
                @click="$graffiti.logout($graffitiSession.value)"
              >
                Log out
              </button>
            </template>
          </div>
        </header>

        <div v-if="!$graffitiSession.value && $route.name !== 'about'" class="gate">
          <p>
            Log in to browse book clubs in
            <code>{{ BOOK_CLUB_DIRECTORY }}</code>, open a room, and send spoiler-tagged notes
            about what you are reading.
          </p>
          <p class="hint">
            You can still read
            <router-link to="/about">About ShelfTalk</router-link>
            without signing in.
          </p>
        </div>

        <main
          v-else-if="!$graffitiSession.value && $route.name === 'about'"
          id="main"
          class="thread thread-standalone"
          tabindex="-1"
        >
          <router-view></router-view>
        </main>

        <div v-else class="workspace">
          <aside class="sidebar" aria-label="Book clubs and your reading list">
            <section class="profile-panel" aria-labelledby="reading-heading">
              <div class="panel-head">
                <h2 id="reading-heading">Currently reading</h2>
                <p class="hint">
                  Saved to your
                  <router-link
                    :to="channelInfoRoute(profileChannel, 'Profile channel', 'Stores your currently-reading list and DM index')"
                    >profile channel</router-link
                  >
                  — visible to anyone who looks up your reader profile.
                </p>
                <router-link class="btn btn-ghost btn-tiny" :to="{ name: 'books' }">Open bookshelf page</router-link>
              </div>

              <div
                v-if="profileError"
                class="banner banner-error profile-banner"
                role="alert"
              >
                <span>{{ profileError }}</span>
                <button type="button" class="btn btn-ghost btn-tiny" @click="dismissProfileError">
                  Dismiss
                </button>
              </div>

              <div v-if="profilePollLoading" class="loading-block">
                <span class="spinner" aria-hidden="true"></span>
                <span>Loading your books…</span>
              </div>
              <div v-else class="profile-status-sections">
                <section class="profile-status-section" aria-labelledby="my-reading-heading">
                  <h3 id="my-reading-heading" class="panel-subhead">Currently reading</h3>
                  <ul class="reading-list" role="list">
                    <li v-if="!myBooksByStatus.reading.length" class="empty">No books in this section.</li>
                    <li v-for="book of myBooksByStatus.reading" :key="book.url" class="reading-row">
                      <div class="reading-main">
                        <span class="reading-title">{{ book.value.title }}</span>
                        <span v-if="book.value.isbn" class="reading-isbn">{{ book.value.isbn }}</span>
                        <span class="reading-status-pill status-reading">Reading</span>
                        <div v-if="book.value.totalPages > 0" class="reading-progress">
                          <span class="reading-stat">Current page: {{ book.value.currentPage ?? 0 }}</span>
                          <span class="reading-stat">Total pages: {{ book.value.totalPages }}</span>
                          <span
                            class="progress-meter"
                            role="img"
                            :aria-label="`Progress: ${Math.min(100, Math.round(((book.value.currentPage ?? 0) / book.value.totalPages) * 100))} percent`"
                          >
                            <span
                              class="progress-fill"
                              :style="{
                                width:
                                  Math.min(
                                    100,
                                    Math.round(
                                      ((book.value.currentPage ?? 0) / book.value.totalPages) * 100,
                                    ),
                                  ) + '%',
                              }"
                            ></span>
                          </span>
                        </div>
                        <div v-else-if="book.value.currentPage != null" class="reading-progress">
                          <span class="reading-stat">Current page: {{ book.value.currentPage }}</span>
                        </div>
                        <div class="book-update-actions">
                          <label class="field compact">
                            <span class="field-label tiny">Update page</span>
                            <input
                              :value="bookPageDrafts[book.url] ?? book.value.currentPage ?? ''"
                              @focus="ensureBookPageDraft(book)"
                              @input="setBookPageDraft(book.url, $event.target.value)"
                              type="number"
                              min="0"
                              placeholder="Current page"
                            />
                          </label>
                          <div class="book-update-buttons">
                            <button
                              type="button"
                              class="btn btn-ghost btn-tiny"
                              @click="updateCurrentPage(book)"
                              :disabled="isUpdatingBook.has(book.url)"
                            >
                              {{ isUpdatingBook.has(book.url) ? "Saving…" : "Save page" }}
                            </button>
                            <button
                              type="button"
                              class="btn btn-ghost btn-tiny"
                              @click="markBookFinished(book)"
                              :disabled="isUpdatingBook.has(book.url)"
                            >
                              Finish
                            </button>
                            <button
                              type="button"
                              class="btn btn-ghost btn-tiny danger"
                              @click="markBookDnf(book)"
                              :disabled="isUpdatingBook.has(book.url)"
                            >
                              DNF
                            </button>
                          </div>
                        </div>
                      </div>
                      <button
                        type="button"
                        class="btn btn-ghost btn-tiny danger"
                        @click="removeCurrentlyReadingBook(book)"
                        :disabled="isRemovingBook.has(book.url) || isUpdatingBook.has(book.url)"
                      >
                        {{ isRemovingBook.has(book.url) ? "Removing…" : "Remove" }}
                      </button>
                    </li>
                  </ul>
                </section>

                <section class="profile-status-section" aria-labelledby="my-finished-heading">
                  <h3 id="my-finished-heading" class="panel-subhead">Finished</h3>
                  <ul class="reading-list" role="list">
                    <li v-if="!myBooksByStatus.finished.length" class="empty">No books in this section.</li>
                    <li v-for="book of myBooksByStatus.finished" :key="book.url" class="reading-row">
                      <div class="reading-main">
                        <span class="reading-title">{{ book.value.title }}</span>
                        <span v-if="book.value.isbn" class="reading-isbn">{{ book.value.isbn }}</span>
                        <span class="reading-status-pill status-finished">Finished</span>
                        <div v-if="book.value.totalPages > 0" class="reading-progress">
                          <span class="reading-stat">Current page: {{ book.value.currentPage ?? 0 }}</span>
                          <span class="reading-stat">Total pages: {{ book.value.totalPages }}</span>
                        </div>
                        <div v-else-if="book.value.currentPage != null" class="reading-progress">
                          <span class="reading-stat">Current page: {{ book.value.currentPage }}</span>
                        </div>
                        <div class="book-update-buttons">
                          <button
                            type="button"
                            class="btn btn-ghost btn-tiny"
                            @click="markBookReading(book)"
                            :disabled="isUpdatingBook.has(book.url)"
                          >
                            Mark reading
                          </button>
                          <button
                            type="button"
                            class="btn btn-ghost btn-tiny danger"
                            @click="markBookDnf(book)"
                            :disabled="isUpdatingBook.has(book.url)"
                          >
                            DNF
                          </button>
                        </div>
                      </div>
                      <button
                        type="button"
                        class="btn btn-ghost btn-tiny danger"
                        @click="removeCurrentlyReadingBook(book)"
                        :disabled="isRemovingBook.has(book.url) || isUpdatingBook.has(book.url)"
                      >
                        {{ isRemovingBook.has(book.url) ? "Removing…" : "Remove" }}
                      </button>
                    </li>
                  </ul>
                </section>

                <section class="profile-status-section" aria-labelledby="my-dnf-heading">
                  <h3 id="my-dnf-heading" class="panel-subhead">DNF</h3>
                  <ul class="reading-list" role="list">
                    <li v-if="!myBooksByStatus.dnf.length" class="empty">No books in this section.</li>
                    <li v-for="book of myBooksByStatus.dnf" :key="book.url" class="reading-row">
                      <div class="reading-main">
                        <span class="reading-title">{{ book.value.title }}</span>
                        <span v-if="book.value.isbn" class="reading-isbn">{{ book.value.isbn }}</span>
                        <span class="reading-status-pill status-dnf">DNF</span>
                        <div v-if="book.value.totalPages > 0" class="reading-progress">
                          <span class="reading-stat">Current page: {{ book.value.currentPage ?? 0 }}</span>
                          <span class="reading-stat">Total pages: {{ book.value.totalPages }}</span>
                        </div>
                        <div v-else-if="book.value.currentPage != null" class="reading-progress">
                          <span class="reading-stat">Current page: {{ book.value.currentPage }}</span>
                        </div>
                        <div class="book-update-buttons">
                          <button
                            type="button"
                            class="btn btn-ghost btn-tiny"
                            @click="markBookReading(book)"
                            :disabled="isUpdatingBook.has(book.url)"
                          >
                            Mark reading
                          </button>
                          <button
                            type="button"
                            class="btn btn-ghost btn-tiny"
                            @click="markBookFinished(book)"
                            :disabled="isUpdatingBook.has(book.url)"
                          >
                            Finish
                          </button>
                        </div>
                      </div>
                      <button
                        type="button"
                        class="btn btn-ghost btn-tiny danger"
                        @click="removeCurrentlyReadingBook(book)"
                        :disabled="isRemovingBook.has(book.url) || isUpdatingBook.has(book.url)"
                      >
                        {{ isRemovingBook.has(book.url) ? "Removing…" : "Remove" }}
                      </button>
                    </li>
                  </ul>
                </section>
              </div>

              <button
                type="button"
                class="btn btn-ghost btn-tiny"
                @click="toggleAddBookForm"
              >
                {{ showAddBookForm ? "Close add book form" : "Add a book" }}
              </button>

              <form v-if="showAddBookForm" class="add-book-form" @submit.prevent="addCurrentlyReadingBook">
                <label class="field">
                  <span class="sr-only">Title</span>
                  <input
                    v-model="newBookTitle"
                    type="text"
                    name="book-title"
                    autocomplete="off"
                    placeholder="Title"
                    maxlength="200"
                    required
                  />
                </label>
                <label class="field">
                  <span class="sr-only">ISBN (optional)</span>
                  <input
                    v-model="newBookIsbn"
                    type="text"
                    name="book-isbn"
                    autocomplete="off"
                    placeholder="ISBN or ID (optional)"
                    maxlength="32"
                  />
                </label>
                <div class="inline-fields">
                  <label class="field">
                    <span class="field-label tiny">Current page</span>
                    <input
                      v-model="newBookCurrentPage"
                      type="number"
                      name="book-current-page"
                      min="0"
                      placeholder="—"
                    />
                  </label>
                  <label class="field">
                    <span class="field-label tiny">Total pages</span>
                    <input
                      v-model="newBookTotalPages"
                      type="number"
                      name="book-total-pages"
                      min="0"
                      placeholder="—"
                    />
                  </label>
                </div>
                <button
                  type="submit"
                  class="btn btn-primary"
                  :disabled="!newBookTitle.trim() || isAddingBook"
                >
                  {{ isAddingBook ? "Adding…" : "Add to profile" }}
                </button>
              </form>
            </section>

            <div class="sidebar-divider" role="presentation"></div>

            <section class="dm-sidebar" aria-labelledby="dm-heading">
              <div class="panel-head">
                <h2 id="dm-heading">Direct messages</h2>
                <p class="hint">Private thread with another reader—only the two of you share the channel.</p>
              </div>
              <router-link class="btn btn-primary dm-inbox-btn" to="/dms">Open message inbox</router-link>
            </section>

            <div class="sidebar-divider" role="presentation"></div>

            <div class="panel-head">
              <h2>Book clubs</h2>
              <p class="hint">Listed in the shared discovery channel for this prototype.</p>
            </div>

            <label class="field">
              <span class="field-label">Search clubs</span>
              <input
                v-model="clubSearchQuery"
                type="search"
                name="club-search"
                autocomplete="off"
                placeholder="Search by title"
              />
            </label>

            <button
              type="button"
              class="btn btn-ghost btn-tiny"
              @click="toggleCreateClubForm"
            >
              {{ showCreateClubForm ? "Close create club form" : "Create a club" }}
            </button>

            <form v-if="showCreateClubForm" class="create-club" @submit.prevent="createBookClub">
              <label class="field">
                <span class="field-label">Start a club</span>
                <input
                  v-model="newClubName"
                  type="text"
                  name="club-name"
                  autocomplete="off"
                  placeholder="e.g. April sci-fi picks"
                  maxlength="80"
                />
              </label>
              <button
                type="submit"
                class="btn btn-primary"
                :disabled="!newClubName.trim() || isCreatingClub"
              >
                {{ isCreatingClub ? "Creating…" : "Create club" }}
              </button>
            </form>

            <div
              v-if="createClubError"
              class="banner banner-error"
              role="alert"
            >
              <span>{{ createClubError }}</span>
              <button type="button" class="btn btn-ghost btn-tiny" @click="dismissCreateError">
                Dismiss
              </button>
            </div>

            <div v-if="clubsLoading" class="loading-block">
              <span class="spinner" aria-hidden="true"></span>
              <span>Loading clubs…</span>
            </div>
            <ul v-else class="club-list" role="list">
              <li v-if="!filteredClubs.length" class="empty">No matching clubs found.</li>
              <li v-for="club of filteredClubs" :key="club.url">
                <div
                  class="club-row"
                  :class="{ active: $route.name === 'chat' && $route.params.chatId === club.value.channel }"
                >
                  <router-link class="club-row-link" :to="{ name: 'chat', params: { chatId: club.value.channel } }">
                    <span class="club-name">{{ club.value.name }}</span>
                    <span class="club-meta">Updated {{ new Date(club.value.published).toLocaleString() }}</span>
                  </router-link>
                  <button
                    v-if="!isMemberOfClub(club.value.channel)"
                    type="button"
                    class="btn btn-ghost btn-tiny"
                    :disabled="isUpdatingMembership.has(club.value.channel)"
                    @click="joinClub(club.value.channel)"
                  >
                    {{ isUpdatingMembership.has(club.value.channel) ? "Joining…" : "Join" }}
                  </button>
                  <span v-else class="club-member-pill">Member</span>
                </div>
              </li>
            </ul>

            <p class="fine-print">
              <router-link to="/about">About</router-link>
              ·
              <a href="writeup.html">Design write-up</a>
              · Spoiler reveal state is local to your browser (intermediate fidelity).
            </p>
          </aside>

          <main id="main" class="thread" tabindex="-1">
            <router-view></router-view>
          </main>
        </div>
      </div>
    </template>

    <template id="tpl-home">
      <div class="thread-empty">
        <h2>Choose a club</h2>
        <p>Select a book club on the left or create a new one to open its conversation.</p>
        <p class="hint">Each club has its own URL you can bookmark or share, for example <code>#/chat/&lt;channel-id&gt;</code>.</p>
      </div>
    </template>

    <template id="tpl-about">
      <article class="about-page prose">
        <h2>About ShelfTalk</h2>
        <p>
          ShelfTalk is a prototype book-club chat built on Graffiti: clubs are discovered in a shared directory,
          each club’s messages live in a private channel, and readers can blur spoilers until others choose to reveal them.
        </p>
        <p>
          Use <router-link to="/">Home</router-link> to pick a club. Each club opens at
          <code>#/chat/&lt;channel-uuid&gt;</code>, so you can bookmark or share a specific room once you know its id.
        </p>
      </article>
    </template>

    <template id="tpl-books">
      <div class="thread-head">
        <div class="thread-head-actions">
          <button type="button" class="btn btn-ghost back-link" @click="goBackOr({ name: 'home' })">Back</button>
          <router-link class="btn btn-ghost btn-tiny" to="/">Home</router-link>
        </div>
        <div>
          <h2>Bookshelf</h2>
          <p class="hint">Full-page view for easier browsing when your reading lists get long.</p>
        </div>
      </div>

      <div v-if="profilePollLoading" class="loading-block">
        <span class="spinner" aria-hidden="true"></span>
        <span>Loading your books…</span>
      </div>
      <div v-else class="profile-status-sections">
        <section class="profile-status-section">
          <h3 class="panel-subhead">Currently reading</h3>
          <ul class="reading-list bookshelf-list" role="list">
            <li v-if="!myBooksByStatus.reading.length" class="empty">No books in this section.</li>
            <li v-for="book of myBooksByStatus.reading" :key="book.url" class="reading-row">
              <div class="reading-main">
                <span class="reading-title">{{ book.value.title }}</span>
                <span v-if="book.value.isbn" class="reading-isbn">{{ book.value.isbn }}</span>
                <span class="reading-status-pill status-reading">Reading</span>
              </div>
            </li>
          </ul>
        </section>

        <section class="profile-status-section">
          <h3 class="panel-subhead">Finished</h3>
          <ul class="reading-list bookshelf-list" role="list">
            <li v-if="!myBooksByStatus.finished.length" class="empty">No books in this section.</li>
            <li v-for="book of myBooksByStatus.finished" :key="book.url" class="reading-row">
              <div class="reading-main">
                <span class="reading-title">{{ book.value.title }}</span>
                <span v-if="book.value.isbn" class="reading-isbn">{{ book.value.isbn }}</span>
                <span class="reading-status-pill status-finished">Finished</span>
              </div>
            </li>
          </ul>
        </section>

        <section class="profile-status-section">
          <h3 class="panel-subhead">DNF</h3>
          <ul class="reading-list bookshelf-list" role="list">
            <li v-if="!myBooksByStatus.dnf.length" class="empty">No books in this section.</li>
            <li v-for="book of myBooksByStatus.dnf" :key="book.url" class="reading-row">
              <div class="reading-main">
                <span class="reading-title">{{ book.value.title }}</span>
                <span v-if="book.value.isbn" class="reading-isbn">{{ book.value.isbn }}</span>
                <span class="reading-status-pill status-dnf">DNF</span>
              </div>
            </li>
          </ul>
        </section>
      </div>
    </template>

    <template id="tpl-chat">
      <div class="thread-head">
        <div class="thread-head-actions">
          <button type="button" class="btn btn-ghost back-link" @click="goBackOr({ name: 'home' })">Back</button>
          <router-link class="btn btn-ghost btn-tiny" to="/">Clubs</router-link>
        </div>
        <div>
          <h2>{{ threadHeadTitle }}</h2>
          <p class="hint">
            Messages live in this
            <router-link
              :to="channelInfoRoute($route.params.chatId, 'Private club channel', 'Contains this club chat thread')"
              >private channel</router-link
            >.
          </p>
          <p v-if="activeClubOwnerActor" class="hint">
            Owner:
            <graffiti-actor-to-handle :actor="activeClubOwnerActor" />
          </p>
        </div>
      </div>

      <section v-if="clubForActiveChat" class="club-settings-panel" aria-labelledby="club-settings-heading">
        <div class="club-settings-header">
          <h3 id="club-settings-heading" class="panel-subhead">Club settings</h3>
          <button type="button" class="btn btn-ghost btn-tiny" @click="toggleClubSettingsPanel">
            {{ showClubSettingsPanel ? "Hide settings" : "Show settings" }}
          </button>
        </div>
        <template v-if="showClubSettingsPanel">
        <dl class="club-settings-display">
          <div>
            <dt>Next meeting</dt>
            <dd>{{ activeClubSettings?.nextMeetingAt || "Not set" }}</dd>
          </div>
          <div>
            <dt>Location / link</dt>
            <dd>{{ activeClubSettings?.nextMeetingLocation || "Not set" }}</dd>
          </div>
          <div>
            <dt>Allowed genres</dt>
            <dd>{{ activeClubSettings?.allowedGenres || "Not set" }}</dd>
          </div>
          <div>
            <dt>Next book</dt>
            <dd>{{ activeClubSettings?.nextBook || "Not set" }}</dd>
          </div>
        </dl>
        <p v-if="!userCanManageActiveClub" class="hint">
          Only the club owner can edit settings or delete this chat.
        </p>
        <button
          v-else
          type="button"
          class="btn btn-ghost btn-tiny"
          @click="toggleClubSettingsEditor"
        >
          {{ showClubSettingsEditor ? "Close update form" : "Update information" }}
        </button>
        <form
          v-if="userCanManageActiveClub && showClubSettingsEditor"
          class="club-settings-form"
          @submit.prevent="saveActiveClubSettings"
        >
          <label class="field">
            <span class="field-label">Club name</span>
            <input
              v-model="clubSettingsName"
              type="text"
              name="club-settings-name"
              maxlength="80"
              autocomplete="off"
              placeholder="Club name"
            />
          </label>
          <label class="field">
            <span class="field-label">Date of next book club</span>
            <input
              v-model="clubSettingsNextMeetingAt"
              type="text"
              name="club-settings-next-meeting"
              maxlength="120"
              autocomplete="off"
              placeholder="e.g. 2026-06-01 7:30 PM ET"
            />
          </label>
          <label class="field">
            <span class="field-label">Location / virtual link</span>
            <input
              v-model="clubSettingsNextMeetingLocation"
              type="text"
              name="club-settings-location"
              maxlength="300"
              autocomplete="off"
              placeholder="e.g. Zoom link or cafe address"
            />
          </label>
          <label class="field">
            <span class="field-label">Allowed genres</span>
            <input
              v-model="clubSettingsAllowedGenres"
              type="text"
              name="club-settings-genres"
              maxlength="240"
              autocomplete="off"
              placeholder="e.g. Sci-fi, Mystery, Memoir"
            />
          </label>
          <label class="field">
            <span class="field-label">Next book</span>
            <input
              v-model="clubSettingsNextBook"
              type="text"
              name="club-settings-next-book"
              maxlength="200"
              autocomplete="off"
              placeholder="e.g. The Left Hand of Darkness"
            />
          </label>
          <div class="club-settings-actions">
            <button
              type="submit"
              class="btn btn-primary btn-tiny"
              :disabled="!clubSettingsName.trim() || isSavingClubSettings || isDeletingClub"
            >
              {{ isSavingClubSettings ? "Saving…" : "Save settings" }}
            </button>
            <button
              type="button"
              class="btn btn-ghost btn-tiny danger"
              :disabled="isSavingClubSettings || isDeletingClub"
              @click="deleteActiveClub"
            >
              {{ isDeletingClub ? "Deleting…" : "Delete club" }}
            </button>
          </div>
        </form>
        </template>
      </section>

      <div v-if="activeClubRequiresJoin" class="banner" role="alert">
        <span>You must join this club before viewing its messages.</span>
        <button
          type="button"
          class="btn btn-ghost btn-tiny"
          :disabled="isUpdatingMembership.has($route.params.chatId)"
          @click="joinClub($route.params.chatId)"
        >
          {{ isUpdatingMembership.has($route.params.chatId) ? "Joining…" : "Join club" }}
        </button>
      </div>

      <div v-if="!activeClubRequiresJoin" class="club-membership-actions">
        <button
          v-if="!userCanManageActiveClub"
          type="button"
          class="btn btn-ghost btn-tiny danger"
          :disabled="isUpdatingMembership.has($route.params.chatId)"
          @click="leaveActiveClub"
        >
          {{ isUpdatingMembership.has($route.params.chatId) ? "Leaving…" : "Leave club" }}
        </button>
      </div>

      <div
        v-if="sendError || deleteError || clubSettingsError"
        class="banner banner-error"
        role="alert"
      >
        <span>{{ sendError || deleteError || clubSettingsError }}</span>
        <button
          type="button"
          class="btn btn-ghost btn-tiny"
          @click="
            sendError
              ? dismissSendError()
              : deleteError
                ? dismissDeleteError()
                : dismissClubSettingsError()
          "
        >
          Dismiss
        </button>
      </div>

      <section v-if="!activeClubRequiresJoin" class="messages" aria-label="Conversation" ref="messageViewportRef">
        <div v-if="isMessageThreadLoading" class="loading-block">
          <span class="spinner" aria-hidden="true"></span>
          <span>Loading messages…</span>
        </div>
        <ul v-else class="message-list" role="list">
          <li v-if="!sortedMessages.length" class="empty">No messages yet — say hello.</li>
          <template v-else>
            <!-- in-DOM template: kebab-case + explicit close (Vue DOM parsing caveats) -->
            <chat-message v-for="m of sortedMessages" :key="m.url" :msg="m"></chat-message>
          </template>
        </ul>
      </section>

      <form v-if="!activeClubRequiresJoin" class="composer" @submit.prevent="sendMessage">
        <label class="field">
          <span class="field-label">Message</span>
          <textarea
            v-model="myMessage"
            rows="3"
            name="message"
            placeholder="Share a reaction, a theory, or a favorite line…"
          ></textarea>
        </label>
        <label class="field">
          <span class="field-label">Book context (optional)</span>
          <input
            v-model="contextBook"
            type="text"
            name="context-book"
            placeholder="Title, ISBN, or shorthand (e.g. Project Hail Mary)"
            maxlength="120"
          />
        </label>
        <label class="checkbox">
          <input v-model="markAsSpoiler" type="checkbox" />
          Mark as spoiler (blurred for readers until they choose to reveal)
        </label>
        <label v-if="markAsSpoiler" class="field">
          <span class="field-label">Spoiler label</span>
          <input
            v-model="spoilerWarning"
            type="text"
            name="spoiler-warning"
            placeholder="e.g. Ending of Part Two"
            maxlength="120"
          />
        </label>
        <div v-if="markAsSpoiler" class="inline-fields">
          <label class="field">
            <span class="field-label tiny">Spoiler after page (optional)</span>
            <input
              v-model="spoilerPage"
              type="number"
              min="1"
              name="spoiler-page-threshold"
              placeholder="e.g. 220"
            />
          </label>
          <label class="field">
            <span class="field-label tiny">Or after progress % (optional)</span>
            <input
              v-model="spoilerProgressPercent"
              type="number"
              min="0"
              max="100"
              step="1"
              name="spoiler-progress-threshold"
              placeholder="e.g. 60"
            />
          </label>
        </div>
        <div class="composer-actions">
          <button
            type="submit"
            class="btn btn-primary"
            :disabled="!myMessage.trim() || isSending"
          >
            {{ isSending ? "Sending…" : "Send" }}
          </button>
          <span class="hint">You can remove your own messages if you sent something by mistake.</span>
        </div>
      </form>
    </template>

    <template id="tpl-reader">
      <div class="thread-head">
        <div class="thread-head-actions">
          <button type="button" class="btn btn-ghost back-link" @click="goBackOr({ name: 'home' })">Back</button>
          <router-link class="btn btn-ghost btn-tiny" to="/">Home</router-link>
        </div>
        <div>
          <h2>Reader profile</h2>
          <p v-if="!readerProfileInvalid && readerProfilePeerActor" class="hint reader-profile-intro">
            <graffiti-actor-to-handle :actor="readerProfilePeerActor" />
            <template v-if="readerProfileDiscoverChannel && readerProfileDiscoverChannel !== profileChannel">
              — books saved on their
              <router-link
                :to="
                  channelInfoRoute(
                    readerProfileDiscoverChannel,
                    'Reader profile channel',
                    'Stores this reader\\'s shared book profile',
                  )
                "
                >profile channel</router-link
              >
            </template>
          </p>
          <p v-if="readerProfileInvalid" class="banner banner-error" role="alert">
            This reader link is invalid or could not be decoded.
          </p>
          <router-link
            v-if="!readerProfileInvalid && readerProfilePeerActor && readerProfilePeerActor !== $graffitiSession.value?.actor"
            class="btn btn-ghost btn-tiny dm-peer-link-inline"
            :to="{ name: 'dm', params: { peerKey: peerToKey(readerProfilePeerActor) } }"
          >
            Message privately
          </router-link>
        </div>
      </div>

      <section v-if="!readerProfileInvalid" class="reader-books" aria-labelledby="reader-books-heading">
        <h3 id="reader-books-heading" class="panel-subhead">Books by status</h3>

        <div v-if="readerProfilePollLoading" class="loading-block">
          <span class="spinner" aria-hidden="true"></span>
          <span>Loading their books…</span>
        </div>
        <div v-else class="profile-status-sections">
          <section class="profile-status-section" aria-labelledby="reader-reading-section-heading">
            <h4 id="reader-reading-section-heading" class="panel-subhead">Currently reading</h4>
            <ul class="reading-list reader-reading-list-static" role="list">
              <li v-if="!readerBooksByStatus.reading.length" class="empty">No books in this section.</li>
              <li v-for="book of readerBooksByStatus.reading" :key="book.url" class="reading-row reading-row-static">
                <div class="reading-main">
                  <span class="reading-title">{{ book.value.title }}</span>
                  <span v-if="book.value.isbn" class="reading-isbn">{{ book.value.isbn }}</span>
                  <span class="reading-status-pill status-reading">Reading</span>
                  <div v-if="book.value.totalPages > 0" class="reading-progress">
                    <span class="reading-stat">Current page: {{ book.value.currentPage ?? 0 }}</span>
                    <span class="reading-stat">Total pages: {{ book.value.totalPages }}</span>
                    <span
                      class="progress-meter"
                      role="img"
                      :aria-label="`Progress: ${Math.min(100, Math.round(((book.value.currentPage ?? 0) / book.value.totalPages) * 100))} percent`"
                    >
                      <span
                        class="progress-fill"
                        :style="{
                          width:
                            Math.min(
                              100,
                              Math.round(
                                ((book.value.currentPage ?? 0) / book.value.totalPages) * 100,
                              ),
                            ) + '%',
                        }"
                      ></span>
                    </span>
                  </div>
                  <div v-else-if="book.value.currentPage != null" class="reading-progress">
                    <span class="reading-stat">Current page: {{ book.value.currentPage }}</span>
                  </div>
                </div>
              </li>
            </ul>
          </section>
          <section class="profile-status-section" aria-labelledby="reader-finished-section-heading">
            <h4 id="reader-finished-section-heading" class="panel-subhead">Finished</h4>
            <ul class="reading-list reader-reading-list-static" role="list">
              <li v-if="!readerBooksByStatus.finished.length" class="empty">No books in this section.</li>
              <li v-for="book of readerBooksByStatus.finished" :key="book.url" class="reading-row reading-row-static">
                <div class="reading-main">
                  <span class="reading-title">{{ book.value.title }}</span>
                  <span v-if="book.value.isbn" class="reading-isbn">{{ book.value.isbn }}</span>
                  <span class="reading-status-pill status-finished">Finished</span>
                  <div v-if="book.value.totalPages > 0" class="reading-progress">
                    <span class="reading-stat">Current page: {{ book.value.currentPage ?? 0 }}</span>
                    <span class="reading-stat">Total pages: {{ book.value.totalPages }}</span>
                  </div>
                  <div v-else-if="book.value.currentPage != null" class="reading-progress">
                    <span class="reading-stat">Current page: {{ book.value.currentPage }}</span>
                  </div>
                </div>
              </li>
            </ul>
          </section>
          <section class="profile-status-section" aria-labelledby="reader-dnf-section-heading">
            <h4 id="reader-dnf-section-heading" class="panel-subhead">DNF</h4>
            <ul class="reading-list reader-reading-list-static" role="list">
              <li v-if="!readerBooksByStatus.dnf.length" class="empty">No books in this section.</li>
              <li v-for="book of readerBooksByStatus.dnf" :key="book.url" class="reading-row reading-row-static">
                <div class="reading-main">
                  <span class="reading-title">{{ book.value.title }}</span>
                  <span v-if="book.value.isbn" class="reading-isbn">{{ book.value.isbn }}</span>
                  <span class="reading-status-pill status-dnf">DNF</span>
                  <div v-if="book.value.totalPages > 0" class="reading-progress">
                    <span class="reading-stat">Current page: {{ book.value.currentPage ?? 0 }}</span>
                    <span class="reading-stat">Total pages: {{ book.value.totalPages }}</span>
                  </div>
                  <div v-else-if="book.value.currentPage != null" class="reading-progress">
                    <span class="reading-stat">Current page: {{ book.value.currentPage }}</span>
                  </div>
                </div>
              </li>
            </ul>
          </section>
          <p
            v-if="!readerBooksByStatus.reading.length && !readerBooksByStatus.finished.length && !readerBooksByStatus.dnf.length"
            class="empty"
          >
            Nothing listed yet — they have not added books to their reader profile channel.
          </p>
        </div>
      </section>
    </template>

    <template id="tpl-dms">
      <div class="thread-head">
        <router-link class="btn btn-ghost back-link" to="/">← Home</router-link>
        <div>
          <h2>Direct messages</h2>
          <p class="hint">
            Private threads with one other reader. Both of you read the same underlying channel, derived from your two
            actor ids.
          </p>
        </div>
      </div>

      <section class="dm-inbox" aria-labelledby="dm-inbox-heading">
        <h3 id="dm-inbox-heading" class="panel-subhead">Recent</h3>
        <ul v-if="dmInboxRows.length" class="dm-inbox-list" role="list">
          <li v-for="row in dmInboxRows" :key="row.peerActor" class="dm-inbox-card">
            <div class="dm-inbox-card-top">
              <router-link
                class="message-actor-profile dm-inbox-profile-link"
                :to="{ name: 'reader', params: { peerKey: peerToKey(row.peerActor) } }"
              >
                <graffiti-actor-to-handle :actor="row.peerActor" />
              </router-link>
              <router-link
                class="btn btn-ghost btn-tiny"
                :to="{ name: 'dm', params: { peerKey: peerToKey(row.peerActor) } }"
              >
                Open thread
              </router-link>
            </div>
            <span class="dm-inbox-meta">{{ new Date(row.updated).toLocaleString() }}</span>
            <span v-if="row.lastPreview" class="dm-inbox-preview">{{ row.lastPreview }}</span>
          </li>
        </ul>
        <p v-else class="thread-empty hint">
          No saved threads yet. After you open or send a direct note, a row appears here (stored on your profile
          channel).
        </p>
      </section>

      <form class="dm-start-form" @submit.prevent="openNewDm">
        <label class="field">
          <span class="field-label">Start a new thread</span>
          <textarea
            v-model="newDmPeerInput"
            rows="2"
            name="dm-peer"
            placeholder="Paste the other reader’s full Graffiti actor id"
            maxlength="4000"
          ></textarea>
        </label>
        <button type="submit" class="btn btn-primary" :disabled="!newDmPeerInput.trim()">Open thread</button>
      </form>
    </template>

    <template id="tpl-dm">
      <div class="thread-head">
        <div class="thread-head-actions">
          <button type="button" class="btn btn-ghost back-link" @click="goBackOr({ name: 'dms' })">Back</button>
          <router-link class="btn btn-ghost btn-tiny" to="/dms">Inbox</router-link>
        </div>
        <div>
          <h2>Direct message</h2>
          <p v-if="!dmPeerInvalid && !dmSelfConversation && dmPeerActor" class="hint">
            With
            <router-link
              class="message-actor-profile"
              :to="{ name: 'reader', params: { peerKey: peerToKey(dmPeerActor) } }"
            >
              <graffiti-actor-to-handle :actor="dmPeerActor" />
            </router-link>
          </p>
          <p v-if="dmPeerInvalid" class="banner banner-error" role="alert">This link is not a valid conversation.</p>
          <p v-if="dmSelfConversation" class="banner banner-error" role="alert">
            You can’t message yourself. Return to the inbox to choose someone else.
          </p>
          <p v-if="!dmPeerInvalid && !dmSelfConversation && dmChannelPreview" class="hint code-tiny">
            Shared
            <router-link
              :to="channelInfoRoute(dmChannelPreview, 'Shared DM channel', 'Contains direct messages for this pair of readers')"
              >DM channel</router-link
            >
          </p>
        </div>
      </div>

      <div
        v-if="!dmPeerInvalid && !dmSelfConversation && (sendError || deleteError)"
        class="banner banner-error"
        role="alert"
      >
        <span>{{ sendError || deleteError }}</span>
        <button
          type="button"
          class="btn btn-ghost btn-tiny"
          @click="sendError ? dismissSendError() : dismissDeleteError()"
        >
          Dismiss
        </button>
      </div>

      <section
        v-if="!dmPeerInvalid && !dmSelfConversation"
        class="messages"
        aria-label="Direct conversation"
        ref="messageViewportRef"
      >
        <div v-if="isMessageThreadLoading" class="loading-block">
          <span class="spinner" aria-hidden="true"></span>
          <span>Loading messages…</span>
        </div>
        <ul v-else class="message-list" role="list">
          <li v-if="!sortedMessages.length" class="empty">No messages yet — say hello.</li>
          <template v-else>
            <chat-message v-for="m of sortedMessages" :key="m.url" :msg="m"></chat-message>
          </template>
        </ul>
      </section>

      <form
        v-if="!dmPeerInvalid && !dmSelfConversation"
        class="composer"
        @submit.prevent="sendMessage"
      >
        <label class="field">
          <span class="field-label">Message</span>
          <textarea
            v-model="myMessage"
            rows="3"
            name="dm-message"
            placeholder="Write a private note…"
          ></textarea>
        </label>
        <label class="checkbox">
          <input v-model="markAsSpoiler" type="checkbox" />
          Mark as spoiler (blurred until they reveal)
        </label>
        <label v-if="markAsSpoiler" class="field">
          <span class="field-label">Spoiler label</span>
          <input
            v-model="spoilerWarning"
            type="text"
            name="dm-spoiler-warning"
            placeholder="e.g. Personal news"
            maxlength="120"
          />
        </label>
        <div v-if="markAsSpoiler" class="inline-fields">
          <label class="field">
            <span class="field-label tiny">Spoiler after page (optional)</span>
            <input
              v-model="spoilerPage"
              type="number"
              min="1"
              name="dm-spoiler-page-threshold"
              placeholder="e.g. 220"
            />
          </label>
          <label class="field">
            <span class="field-label tiny">Or after progress % (optional)</span>
            <input
              v-model="spoilerProgressPercent"
              type="number"
              min="0"
              max="100"
              step="1"
              name="dm-spoiler-progress-threshold"
              placeholder="e.g. 60"
            />
          </label>
        </div>
        <div class="composer-actions">
          <button type="submit" class="btn btn-primary" :disabled="!myMessage.trim() || isSending">
            {{ isSending ? "Sending…" : "Send" }}
          </button>
        </div>
      </form>
    </template>

    <template id="tpl-channel">
      <article class="thread-empty channel-info-page">
        <h2>{{ $route.query.label || "Channel details" }}</h2>
        <p class="hint">
          {{ $route.query.context || "This page explains what this channel is used for in ShelfTalk." }}
        </p>
        <p class="hint">
          Channel id:
          <code class="code-tiny">{{ $route.query.id || "Unavailable" }}</code>
        </p>
        <div class="channel-info-actions">
          <button
            type="button"
            class="btn btn-primary btn-tiny"
            :disabled="!$route.query.id"
            @click="copyChannelInfoId($route.query.id)"
          >
            Copy channel id
          </button>
          <router-link class="btn btn-ghost btn-tiny" to="/">Back home</router-link>
        </div>
        <p v-if="channelInfoCopyFeedback" class="hint">{{ channelInfoCopyFeedback }}</p>
      </article>
    </template>

    <template id="tpl-message-row">
      <li
        class="message"
        :class="{ mine: msg.actor === $graffitiSession.value?.actor }"
      >
        <div class="message-meta message-meta-row">
          <div class="message-meta-main">
            <span class="message-author-label">From</span>
            <router-link
              v-if="msg.actor"
              class="message-actor-profile"
              :to="{ name: 'reader', params: { peerKey: peerToKey(msg.actor) } }"
            >
              <graffiti-actor-to-handle :actor="msg.actor" />
            </router-link>
            <span v-else class="hint">Unknown reader</span>
            <time :datetime="new Date(msg.value.published).toISOString()">
              {{ new Date(msg.value.published).toLocaleString() }}
            </time>
          </div>
          <router-link
            v-if="msg.actor && msg.actor !== $graffitiSession.value?.actor"
            class="btn btn-ghost btn-tiny dm-peer-link"
            :to="{ name: 'dm', params: { peerKey: peerToKey(msg.actor) } }"
            >Message privately</router-link>
        </div>
        <div v-if="msg.value.contextBook" class="book-tag">
          Re: <span>{{ msg.value.contextBook }}</span>
        </div>
        <div
          class="bubble"
          :class="{ blurred: msg.value.isBlurred && !revealedMessageUrls.has(msg.url) && !shouldAutoRevealSpoiler(msg) }"
        >
          <p v-if="msg.value.isBlurred" class="spoiler-label">
            {{ msg.value.spoilerWarning || "Spoiler" }}
          </p>
          <p v-if="shouldAutoRevealSpoiler(msg)" class="spoiler-autoreveal-note">
            Auto-revealed based on your reading progress.
          </p>
          <p class="message-text">{{ msg.value.content }}</p>
        </div>
        <div class="message-actions">
          <button
            v-if="msg.value.isBlurred && !shouldAutoRevealSpoiler(msg)"
            type="button"
            class="btn btn-ghost btn-tiny"
            @click="toggleRevealWithAlert(msg)"
          >
            {{ revealedMessageUrls.has(msg.url) ? "Hide spoiler" : "Show spoiler" }}
          </button>
          <button
            v-if="msg.actor === $graffitiSession.value?.actor"
            type="button"
            class="btn btn-ghost btn-tiny danger"
            @click="deleteMessage(msg)"
            :disabled="isDeleting.has(msg.url)"
          >
            {{ isDeleting.has(msg.url) ? "Removing…" : "Remove message" }}
          </button>
        </div>
      </li>
    </template>
  </body>
</html>
